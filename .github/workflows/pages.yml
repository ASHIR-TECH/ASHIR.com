name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    name: Validate site structure
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f .nojekyll
          test -f assets/css/style.css
          test -f pages/about.html
          test -f pages/services.html
          test -f pages/projects.html
          test -f pages/contact.html
          test -f pages/faq.html

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp -R assets _site/
          cp -R pages _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
